<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cửa Hàng - BloomRead</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="CSS/BloomRead.css">
    <script src="JS/components.js"></script>
    <link rel="stylesheet" href="CSS/shop.css">
</head>
<body>
    <div id="page-loader">
        <div class="spinner"></div>
        <h2 style="color: #16A34A; font-family: 'Inter', sans-serif; font-size: 24px; letter-spacing: 1px;">Đang vào cửa hàng...</h2>
    </div>

    <div id="custom-popup">
        <div class="popup-box">
            <div class="popup-msg" id="popup-msg-text"></div>
            <button class="popup-btn" onclick="closePopup()">Đóng</button>
        </div>
    </div>

    <div id="custom-confirm">
        <div class="popup-box">
            <div class="popup-msg" id="confirm-msg-text"></div>
            <div class="popup-btn-group">
                <button class="popup-btn popup-btn-cancel" id="btn-confirm-no">Hủy</button>
                <button class="popup-btn" id="btn-confirm-yes">Đồng ý</button>
            </div>
        </div>
    </div>

    <app-header></app-header>
    <app-auth-modals></app-auth-modals>

    <main class="shop-main" id="shop-wrapper" style="display: none;">
        <div class="shop-header">
            <h1 class="shop-title">SHOP</h1>
            <div class="user-balance">
                <img src="Img/MinhQuanSeed.jpg" alt="Coins">
                <span id="display-readpoints">0</span>
            </div>
        </div>

        <div class="shop-container">
            <div class="shop-tabs">
                <button class="tab-btn active" onclick="switchTab('tab-seeds', this)">HẠT GIỐNG</button>
                <button class="tab-btn" onclick="switchTab('tab-pots', this)">CHẬU HOA</button>
                <button class="tab-btn" onclick="switchTab('tab-bgs', this)">HÌNH NỀN</button>
                <button class="tab-btn" onclick="switchTab('tab-event', this)">EVENT</button>
            </div>

            <div class="shop-content">
                <div id="tab-seeds" class="tab-pane active"></div>
                <div id="tab-pots" class="tab-pane"></div>
                <div id="tab-bgs" class="tab-pane"></div>
                <div id="tab-event" class="tab-pane"></div>
            </div>
        </div>
    </main>

    <app-footer></app-footer>

    <script type="module" src="JS/main.js"></script>
    <script type="module" src="JS/shop.js"></script>
</body>
</html>
